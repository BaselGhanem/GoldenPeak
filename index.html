<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>IronPeak Capital</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Almarai:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap');
    
    :root {
      --bg-base: #060a0f;
      --bg-surface: rgba(13, 22, 33, 0.6);
      --glass-border: rgba(255, 255, 255, 0.06);
      --glass-highlight: rgba(255, 255, 255, 0.1);
      
      --deep-teal: #002b24;
      --primary-teal: #00A693;
      --teal-glow: rgba(0, 166, 147, 0.4);
      
      --gold-premium: #D4AF37;
      --gold-light: #F9E596;
      --gold-glow: rgba(212, 175, 55, 0.3);

      --text-main: #F8FAFC;
      --text-muted: #94A3B8;
      --danger: #ef4444;
      
      --font-primary: 'Tajawal', 'Almarai', sans-serif;
      --font-heading: 'Almarai', sans-serif;
      --transition-smooth: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: var(--font-primary);
      background-color: var(--bg-base);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      transition: direction 0.3s ease;
    }

    /* RTL/LTR Specifics */
    html[dir="ltr"] body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    html[dir="ltr"] .form-label { right: auto; left: 16px; }
    html[dir="ltr"] .form-control:focus ~ .form-label,
    html[dir="ltr"] .form-control:not(:placeholder-shown) ~ .form-label { right: auto; left: 12px; }
    html[dir="ltr"] .nav-logo { flex-direction: row; }
    html[dir="ltr"] th, html[dir="ltr"] td { text-align: left; }
    html[dir="rtl"] th, html[dir="rtl"] td { text-align: right; }
    html[dir="ltr"] td:first-child { border-radius: 12px 0 0 12px; }
    html[dir="ltr"] td:last-child { border-radius: 0 12px 12px 0; }

    .background-pattern {
      position: fixed; inset: 0; z-index: -1;
      background: 
        radial-gradient(circle at 15% 20%, var(--teal-glow) 0%, transparent 40%),
        radial-gradient(circle at 85% 80%, var(--gold-glow) 0%, transparent 40%);
      filter: blur(80px); opacity: 0.6; animation: pulseGlow 10s infinite alternate;
    }

    @keyframes pulseGlow {
      0% { transform: scale(1); opacity: 0.5; }
      100% { transform: scale(1.1); opacity: 0.8; }
    }

    /* --- Authentication / Login Screen --- */
    #loginScreen {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg-base);
      display: flex; justify-content: center; align-items: center;
      transition: opacity 0.5s ease;
    }
    .login-box {
      background: var(--bg-surface); padding: 50px 40px; border-radius: 24px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
      width: 90%; max-width: 420px; border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px); text-align: center;
    }
    .login-logo { font-family: var(--font-heading); font-size: 2.2rem; margin-bottom: 30px; color: var(--gold-premium); font-weight: bold;}
    .login-logo i { background: linear-gradient(135deg, var(--gold-premium), var(--gold-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .login-box .form-group { margin-bottom: 20px; }

    /* --- Navigation --- */
    .modern-nav {
      position: fixed; top: 0; left: 0; width: 100%;
      background: rgba(6, 10, 15, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border); z-index: 1000;
    }
    .nav-container {
      max-width: 1400px; margin: auto; display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem;
    }
    .nav-logo { font-family: var(--font-heading); font-size: 1.6rem; font-weight: 700; color: var(--text-main); display: flex; align-items: center; gap: 10px; }
    .nav-logo i { background: linear-gradient(135deg, var(--gold-premium), var(--gold-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-logo span { color: var(--gold-premium); font-weight: 400;}
    .nav-menu { display: flex; gap: 10px; flex: 1; justify-content: center; }
    .nav-actions { display: flex; gap: 15px; align-items: center; }
    
    .nav-link {
      text-decoration: none; color: var(--text-muted); font-weight: 500; font-size: 1.05rem;
      padding: 10px 18px; border-radius: 12px; transition: all var(--transition-smooth);
      cursor: pointer; border: 1px solid transparent; background: transparent;
      display: flex; align-items: center; gap: 8px;
    }
    .nav-link:hover { color: var(--text-main); background: var(--glass-highlight); }
    .nav-link.active { color: var(--gold-premium); background: var(--bg-surface); border-color: var(--glass-border); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

    .icon-btn {
      background: transparent; border: 1px solid var(--glass-border); color: var(--text-main);
      padding: 10px; border-radius: 50%; cursor: pointer; transition: 0.3s;
      display: flex; justify-content: center; align-items: center; width: 42px; height: 42px;
    }
    .icon-btn:hover { background: var(--glass-highlight); color: var(--gold-premium); }

    /* --- Main App --- */
    #appContainer { display: none; }
    .main-content { max-width: 1400px; margin: 110px auto 60px; padding: 0 20px; flex: 1; width: 100%; }
    .tab-content { display: none; opacity: 0; transform: translateY(15px); transition: all 0.4s ease; }
    .tab-content.active { display: block; opacity: 1; transform: translateY(0); animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* --- Forms --- */
    .form-container {
      background: var(--bg-surface); padding: 40px; border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
      max-width: 550px; margin: 0 auto; border: 1px solid var(--glass-border); backdrop-filter: blur(16px);
    }
    .form-header { text-align: center; margin-bottom: 35px; }
    .form-header h2 { font-family: var(--font-heading); color: var(--text-main); font-size: 1.8rem; margin-bottom: 10px; }
    .form-header p { color: var(--text-muted); font-size: 0.95rem; }

    .form-group { position: relative; margin-bottom: 25px; }
    .form-control {
      width: 100%; padding: 18px 16px 14px; background: rgba(0,0,0,0.2);
      border: 1px solid var(--glass-border); border-radius: 14px; 
      font-family: inherit; font-size: 1.1rem; color: var(--text-main); transition: var(--transition-smooth);
    }
    .form-control:focus { outline: none; border-color: var(--gold-premium); background: rgba(0,0,0,0.4); box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.1); }
    .form-control::placeholder { color: transparent; }
    .form-label { position: absolute; top: 18px; color: var(--text-muted); transition: var(--transition-smooth); pointer-events: none; font-size: 1rem; }
    .form-control:focus ~ .form-label, .form-control:not(:placeholder-shown) ~ .form-label {
      transform: translateY(-28px) scale(0.85); color: var(--gold-premium); background: var(--bg-base); padding: 0 8px; border-radius: 4px;
    }

    .btn-submit {
      width: 100%; padding: 18px; background: linear-gradient(135deg, var(--gold-premium), #b8860b); color: #000;
      border: none; border-radius: 14px; font-size: 1.2rem; font-weight: 700; cursor: pointer; transition: var(--transition-smooth);
      font-family: inherit; position: relative; overflow: hidden; box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
    }
    .btn-submit::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); transition: 0.5s; }
    .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(212, 175, 55, 0.3); }
    .btn-submit:hover::after { left: 100%; }

    /* --- Widgets / Cards Grid --- */
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-card {
      position: relative; background: var(--bg-surface); padding: 25px 20px; border-radius: 20px; text-align: center; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.2); border: 1px solid var(--glass-border); transition: var(--transition-smooth);
      backdrop-filter: blur(12px); overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .stat-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, var(--primary-teal), var(--gold-premium)); opacity: 0; transition: var(--transition-smooth); }
    .stat-card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.15); }
    .stat-card:hover::before { opacity: 1; }
    
    .stat-icon { font-size: 2.2rem; margin-bottom: 12px; background: linear-gradient(135deg, #fff, var(--text-muted)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .stat-title { font-size: 1.05rem; color: var(--text-muted); margin-bottom: 8px; font-weight: 500;}
    .stat-value { font-size: 2rem; font-weight: 700; color: var(--text-main); font-family: var(--font-heading); letter-spacing: 1px;}
    .stat-currency { font-size: 0.9rem; color: var(--text-muted); font-weight: 400; margin-inline-start: 5px; }

    /* --- Charts & TradingView --- */
    .charts-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); gap: 30px; }
    .chart-wrapper { background: var(--bg-surface); padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); border: 1px solid var(--glass-border); height: 450px; backdrop-filter: blur(12px); }
    .chart-title { font-family: var(--font-heading); color: var(--text-main); font-size: 1.2rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    .chart-title i { color: var(--gold-premium); }
    
    .tradingview-widget-wrapper { background: var(--bg-surface); border-radius: 24px; overflow: hidden; height: 600px; border: 1px solid var(--glass-border); box-shadow: 0 10px 40px rgba(0,0,0,0.3); }

    /* --- Table --- */
    .table-container { background: var(--bg-surface); border-radius: 24px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); border: 1px solid var(--glass-border); overflow-x: auto; backdrop-filter: blur(12px); }
    .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .header-actions h2 { font-family: var(--font-heading); color: var(--text-main); font-size: 1.6rem; }
    .btn-action {
      background: rgba(255,255,255,0.05); color: var(--text-main); padding: 12px 20px; border: 1px solid var(--glass-border); 
      border-radius: 12px; cursor: pointer; font-family: inherit; transition: var(--transition-smooth); display: flex; gap: 8px; align-items: center; font-weight: 600;
    }
    .btn-action.btn-export { background: linear-gradient(135deg, var(--primary-teal), var(--deep-teal)); border: none; color: #fff;}
    .btn-action.btn-clear { background: rgba(239, 68, 68, 0.1); color: var(--danger); border-color: rgba(239, 68, 68, 0.2); }
    
    table { width: 100%; border-collapse: separate; border-spacing: 0 6px; min-width: 800px; }
    th { padding: 16px 12px; color: var(--text-muted); font-weight: 600; font-size: 0.95rem; text-transform: uppercase; border-bottom: 1px solid var(--glass-border); }
    td { padding: 16px 12px; background: rgba(255,255,255,0.02); color: var(--text-main); font-weight: 500; transition: var(--transition-smooth); }
    tr:hover td { background: rgba(255,255,255,0.06); transform: scale(1.01); }
    .net-profit-cell { font-weight: 700; color: var(--gold-premium); font-size: 1.1rem; }
    .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.85rem; font-weight: 700; display: inline-block; }

    /* Admin Settings List */
    .user-list { margin-top: 20px; }
    .user-card { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 12px; margin-bottom: 10px; }
    .user-info { display: flex; align-items: center; gap: 15px; }
    .color-dot { width: 16px; height: 16px; border-radius: 50%; }

    /* --- Toasts & Loaders --- */
    .toast-container { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none;}
    .toast {
      background: rgba(10, 25, 36, 0.95); border: 1px solid var(--gold-premium); color: var(--text-main); padding: 14px 20px;
      border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 12px; font-weight: 500;
      opacity: 0; transform: translateY(20px); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); backdrop-filter: blur(10px);
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast i { color: var(--gold-premium); font-size: 1.2rem; }
    .toast.error { border-color: var(--danger); }
    .toast.error i { color: var(--danger); }

    /* --- MOBILE APP UI --- */
    @media (max-width: 768px) {
      .nav-container { padding: 15px; }
      .nav-logo { font-size: 1.3rem; }
      .nav-menu {
        position: fixed; bottom: 0; left: 0; width: 100%; 
        background: rgba(6, 10, 15, 0.95); border-top: 1px solid var(--glass-border);
        backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        padding: 10px 5px; padding-bottom: calc(10px + env(safe-area-inset-bottom));
        justify-content: space-around; z-index: 1000;
      }
      .nav-link { flex-direction: column; font-size: 0.75rem; padding: 8px 4px; gap: 5px; border-radius: 10px; width: 22%; text-align: center;}
      .nav-link i { font-size: 1.2rem; margin: 0; }
      .nav-link span.tab-text { display: block; white-space: nowrap; font-size: 0.7rem;}
      
      .main-content { margin-top: 80px; margin-bottom: 90px; padding: 0 15px; }
      .charts-container { grid-template-columns: 1fr; }
      .chart-wrapper { height: 350px; padding: 15px; }
      .header-actions { flex-direction: column; gap: 15px; align-items: stretch;}
      .header-actions > div { display: flex; flex-direction: column; gap: 10px; }
      .btn-action { justify-content: center; }
      .form-container, .table-container { padding: 25px 15px; }
      .tradingview-widget-wrapper { height: 450px; }
      
      /* Hide user info on mobile top bar, keep icons */
      .nav-actions span { display: none; }
    }
  </style>
</head>
<body>
  <div class="background-pattern"></div>
  <div class="toast-container" id="toastContainer"></div>

  <div id="loginScreen">
    <div class="login-box">
      <div class="login-logo"><i class="fa-solid fa-gem"></i> IronPeak <span>Capital</span></div>
      <h3 id="loginTitleText" style="margin-bottom: 25px; color: var(--text-muted); font-weight: 400;">تسجيل الدخول</h3>
      <form id="loginForm">
        <div class="form-group">
          <input type="text" id="loginUser" class="form-control" required placeholder=" ">
          <label for="loginUser" class="form-label" data-i18n="username">اسم المستخدم</label>
        </div>
        <div class="form-group">
          <input type="password" id="loginPass" class="form-control" required placeholder=" ">
          <label for="loginPass" class="form-label" data-i18n="password">كلمة المرور</label>
        </div>
        <button type="submit" class="btn-submit" data-i18n="loginBtn">دخول</button>
      </form>
    </div>
  </div>

  <div id="appContainer">
    <nav class="modern-nav">
      <div class="nav-container">
        <div class="nav-logo">
          <i class="fa-solid fa-gem"></i> <span data-i18n="brand1">IronPeak</span>&nbsp;<span style="color:var(--text-main)" data-i18n="brand2">Capital</span>
        </div>
        
        <div class="nav-actions">
          <span id="currentUserDisplay" style="color: var(--gold-premium); font-weight: bold; margin-inline-end: 10px;"></span>
          <button class="icon-btn" onclick="toggleLanguage()" title="تغيير اللغة">
            <i class="fa-solid fa-language"></i>
          </button>
          <button class="icon-btn" onclick="logout()" title="تسجيل الخروج">
            <i class="fa-solid fa-power-off" style="color: var(--danger)"></i>
          </button>
        </div>
      </div>
      <div class="nav-menu">
        <button class="nav-link active" onclick="switchTab('input')" id="navInput">
          <i class="fa-solid fa-pen-nib"></i> <span class="tab-text" data-i18n="navInput">إدخال</span>
        </button>
        <button class="nav-link" onclick="switchTab('analytics')" id="navAnalytics">
          <i class="fa-solid fa-chart-pie"></i> <span class="tab-text" data-i18n="navAnalytics">تحليلات</span>
        </button>
        <button class="nav-link" onclick="switchTab('market')" id="navMarket">
          <i class="fa-solid fa-chart-line"></i> <span class="tab-text" data-i18n="navMarket">السوق</span>
        </button>
        <button class="nav-link" onclick="switchTab('transactions')" id="navHistory">
          <i class="fa-solid fa-clock-rotate-left"></i> <span class="tab-text" data-i18n="navHistory">السجل</span>
        </button>
        <button class="nav-link" onclick="switchTab('admin')" id="navAdmin" style="display: none;">
          <i class="fa-solid fa-user-gear"></i> <span class="tab-text" data-i18n="navAdmin">تعريفات</span>
        </button>
      </div>
    </nav>

    <main class="main-content">
      
      <section id="input" class="tab-content active">
        <div class="form-container">
          <div class="form-header">
            <h2 data-i18n="inputTitle">إدخال الأرباح</h2>
            <p data-i18n="inputDesc">أدخل صافي أرباح الشركاء لهذا اليوم</p>
          </div>
          <form id="entryForm">
            <div class="form-group">
              <input type="date" id="date" class="form-control" required placeholder=" ">
              <label for="date" class="form-label" data-i18n="date">التاريخ</label>
            </div>
            <div id="dynamicPartnerInputs"></div>

            <button type="submit" class="btn-submit">
              <i class="fa-solid fa-check-double"></i> <span data-i18n="saveBtn">اعتماد البيانات</span>
            </button>
          </form>
        </div>
      </section>

      <section id="analytics" class="tab-content">
        <div class="cards-grid" id="analyticsCardsGrid">
          </div>

        <div class="charts-container">
          <div class="chart-wrapper">
            <div class="chart-title"><i class="fa-solid fa-chart-column"></i> <span data-i18n="chartMonthly">الأرباح الشهرية للشركاء</span></div>
            <div style="position: relative; height: 90%; width: 100%;">
              <canvas id="monthlyChart"></canvas>
            </div>
          </div>
          <div class="chart-wrapper">
            <div class="chart-title"><i class="fa-solid fa-chart-area"></i> <span data-i18n="chartDaily">تراكمي وصافي الربح اليومي</span></div>
            <div style="position: relative; height: 90%; width: 100%;">
              <canvas id="dailyCumulativeChart"></canvas>
            </div>
          </div>
        </div>
      </section>

      <section id="market" class="tab-content">
        <div class="tradingview-widget-wrapper">
          <div class="tradingview-widget-container" style="height:100%;width:100%">
            <div class="tradingview-widget-container__widget" style="height:calc(100% - 32px);width:100%"></div>
            <div class="tradingview-widget-copyright"><a href="https://www.tradingview.com/symbols/XAUUSD/?exchange=OANDA" rel="noopener nofollow" target="_blank"><span class="blue-text">XAUUSD quote</span></a><span class="trademark">&nbsp;by TradingView</span></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js" async>
            {
              "lineWidth": 2,
              "lineType": 0,
              "chartType": "area",
              "fontColor": "rgb(106, 109, 120)",
              "gridLineColor": "rgba(242, 242, 242, 0.06)",
              "volumeUpColor": "rgba(212, 175, 55, 0.5)",
              "volumeDownColor": "rgba(239, 68, 68, 0.5)",
              "backgroundColor": "#060a0f",
              "widgetFontColor": "#DBDBDB",
              "upColor": "#D4AF37",
              "downColor": "#ef4444",
              "borderUpColor": "#D4AF37",
              "borderDownColor": "#ef4444",
              "wickUpColor": "#D4AF37",
              "wickDownColor": "#ef4444",
              "colorTheme": "dark",
              "isTransparent": true,
              "locale": "en",
              "chartOnly": false,
              "scalePosition": "right",
              "scaleMode": "Normal",
              "fontFamily": "-apple-system, BlinkMacSystemFont, Trebuchet MS, Roboto, Ubuntu, sans-serif",
              "valuesTracking": "1",
              "changeMode": "price-and-percent",
              "symbols": [
                [
                  "OANDA:XAUUSD|1D"
                ]
              ],
              "dateRanges": [
                "1d|1",
                "1m|30",
                "3m|60",
                "12m|1D",
                "60m|1W",
                "all|1M"
              ],
              "fontSize": "10",
              "headerFontSize": "medium",
              "autosize": true,
              "width": "100%",
              "height": "100%",
              "noTimeScale": false,
              "hideDateRanges": false,
              "hideMarketStatus": false,
              "hideSymbolLogo": false
            }
            </script>
          </div>
          </div>
      </section>

      <section id="transactions" class="tab-content">
        <div class="table-container">
          <div class="header-actions">
            <h2><i class="fa-solid fa-list-check" style="color:var(--gold-premium); margin-inline-end:10px;"></i> <span data-i18n="historyTitle">السجل المالي</span></h2>
            <div>
              <button class="btn-action btn-clear" onclick="clearData()"><i class="fa-solid fa-trash-can"></i> <span data-i18n="clearBtn">مسح</span></button>
              <button class="btn-action btn-export" onclick="exportToExcel()"><i class="fa-solid fa-file-excel"></i> <span data-i18n="exportBtn">تصدير</span></button>
            </div>
          </div>
          <table id="dataTable">
            <thead>
              <tr id="tableHeaderRow">
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </section>

      <section id="admin" class="tab-content">
        <div class="form-container" style="max-width: 800px;">
          <div class="form-header">
            <h2 data-i18n="adminTitle">إدارة الشركاء</h2>
            <p data-i18n="adminDesc">إضافة شركاء جدد للنظام</p>
          </div>
          
          <form id="addPartnerForm" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group" style="margin-bottom:0;">
              <input type="text" id="p_username" class="form-control" required placeholder=" ">
              <label for="p_username" class="form-label" data-i18n="pUsername">اسم المستخدم (Login)</label>
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <input type="text" id="p_password" class="form-control" required placeholder=" ">
              <label for="p_password" class="form-label" data-i18n="pPassword">كلمة المرور</label>
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <input type="text" id="p_nameAr" class="form-control" required placeholder=" ">
              <label for="p_nameAr" class="form-label" data-i18n="pNameAr">الاسم (عربي)</label>
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <input type="text" id="p_nameEn" class="form-control" required placeholder=" ">
              <label for="p_nameEn" class="form-label" data-i18n="pNameEn">الاسم (انجليزي)</label>
            </div>
            <div class="form-group" style="grid-column: span 2;">
              <label style="color:var(--text-muted); font-size: 0.9rem; margin-bottom: 5px; display:block;" data-i18n="pColor">لون الشريك في الرسوم البيانية</label>
              <input type="color" id="p_color" value="#00A693" style="width: 100%; height: 50px; border:none; border-radius: 12px; cursor:pointer; background: transparent;">
            </div>
            <button type="submit" class="btn-submit" style="grid-column: span 2;"><i class="fa-solid fa-plus"></i> <span data-i18n="addPartnerBtn">إضافة الشريك</span></button>
          </form>

          <div style="margin-top: 40px;">
            <h3 style="color:var(--text-main); margin-bottom:15px; font-family:var(--font-heading);" data-i18n="currentPartners">الشركاء الحاليين</h3>
            <div id="adminPartnersList" class="user-list"></div>
          </div>
        </div>
      </section>

    </main>
  </div>

  <script>
    /* --- State Management --- */
    const defaultPartners = {
      omar: { id: 'omar', pass: '2026', role: 'partner', nameAr: 'عمر', nameEn: 'Omar', color: '#00E676' },
      rakan: { id: 'rakan', pass: '2026', role: 'partner', nameAr: 'راكان', nameEn: 'Rakan', color: '#D4AF37' }
    };
    const adminUser = { id: 'admin', pass: 'admin2026', role: 'admin', nameAr: 'مدير النظام', nameEn: 'Admin' };

    let ironPeakLang = localStorage.getItem('ironPeakLang') || 'ar';
    let ironPeakPartners = JSON.parse(localStorage.getItem('ironPeakPartners')) || defaultPartners;
    let ironPeakData = JSON.parse(localStorage.getItem('ironPeakData')) || [];
    let currentUser = JSON.parse(sessionStorage.getItem('ironPeakUser')) || null;
    
    let monthlyChartInstance = null;
    let dailyChartInstance = null;

    /* --- Dictionary (i18n) --- */
    const dict = {
      ar: {
        brand1: "IronPeak", brand2: "Capital", username: "اسم المستخدم", password: "كلمة المرور", loginBtn: "تسجيل الدخول",
        navInput: "إدخال", navAnalytics: "تحليلات", navMarket: "السوق", navHistory: "السجل", navAdmin: "تعريفات",
        inputTitle: "إدخال الأرباح", inputDesc: "أدخل صافي أرباح الشركاء لهذا اليوم", date: "التاريخ", saveBtn: "اعتماد البيانات",
        chartMonthly: "الأرباح الشهرية للشركاء", chartDaily: "تراكمي وصافي الربح اليومي", historyTitle: "السجل المالي", clearBtn: "مسح السجلات", exportBtn: "تصدير Excel",
        adminTitle: "إدارة الشركاء", adminDesc: "إضافة شركاء جدد وصلاحيات الدخول", pUsername: "اسم المستخدم (للدخول)", pPassword: "كلمة المرور",
        pNameAr: "الاسم (عربي)", pNameEn: "الاسم (انجليزي)", pColor: "لون الشريك", addPartnerBtn: "حفظ الشريك", currentPartners: "قائمة الشركاء",
        netProfit: "إجمالي الأرباح", days: "أيام العمل", dayUnit: "يوم", profitShare: "أرباح", thDate: "التاريخ", thMonth: "الشهر", thNet: "صافي الربح",
        errLogin: "بيانات الدخول غير صحيحة", succLogin: "مرحباً بك", succSave: "تم الحفظ بنجاح", succAdd: "تمت إضافة الشريك", confirmClear: "تأكيد مسح كافة السجلات؟",
        emptyData: "لا توجد حركات مالية مسجلة حالياً", currency: "JD", noExport: "لا توجد بيانات للتصدير"
      },
      en: {
        brand1: "IronPeak", brand2: "Capital", username: "Username", password: "Password", loginBtn: "Sign In",
        navInput: "Input", navAnalytics: "Analytics", navMarket: "Market", navHistory: "History", navAdmin: "Settings",
        inputTitle: "Profit Entry", inputDesc: "Enter daily net profit shares", date: "Date", saveBtn: "Submit Data",
        chartMonthly: "Monthly Partner Profits", chartDaily: "Daily Net & Cumulative", historyTitle: "Financial History", clearBtn: "Clear Data", exportBtn: "Export Excel",
        adminTitle: "Partner Management", adminDesc: "Add new partners to the system", pUsername: "Username", pPassword: "Password",
        pNameAr: "Name (Arabic)", pNameEn: "Name (English)", pColor: "Chart Color", addPartnerBtn: "Add Partner", currentPartners: "Active Partners",
        netProfit: "Net Profit", days: "Active Days", dayUnit: "Days", profitShare: "Profit", thDate: "Date", thMonth: "Month", thNet: "Net Profit",
        errLogin: "Invalid credentials", succLogin: "Welcome back", succSave: "Data saved successfully", succAdd: "Partner added", confirmClear: "Are you sure you want to clear all data?",
        emptyData: "No financial records found", currency: "JD", noExport: "No data to export"
      }
    };

    /* --- Initialization --- */
    window.addEventListener('load', () => {
      applyLanguage(ironPeakLang);
      if (currentUser) {
        showApp();
      } else {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('loginTitleText').innerText = ironPeakLang === 'ar' ? 'تسجيل الدخول' : 'Login to Dashboard';
      }
      document.getElementById('date').valueAsDate = new Date();
    });

    /* --- i18n Logic --- */
    function toggleLanguage() {
      ironPeakLang = ironPeakLang === 'ar' ? 'en' : 'ar';
      localStorage.setItem('ironPeakLang', ironPeakLang);
      applyLanguage(ironPeakLang);
      if(currentUser) renderDynamicUI(); 
    }

    function applyLanguage(lang) {
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (dict[lang][key]) {
          if(el.tagName === 'INPUT' && el.hasAttribute('placeholder')) {
             // Let css handle floating label
          } else {
            el.innerText = dict[lang][key];
          }
        }
      });
      document.getElementById('loginTitleText').innerText = lang === 'ar' ? 'تسجيل الدخول' : 'Login to Dashboard';
      
      // Update dynamic parts if logged in
      if(currentUser) {
        document.getElementById('currentUserDisplay').innerText = (lang === 'ar' ? 'مرحباً، ' : 'Welcome, ') + (lang === 'ar' ? currentUser.nameAr : currentUser.nameEn);
        if(monthlyChartInstance) updateAnalytics();
      }
    }

    /* --- Toast --- */
    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      const icon = type === 'success' ? 'fa-circle-check' : 'fa-circle-exclamation';
      toast.innerHTML = `<i class="fa-solid ${icon}"></i> <span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => toast.classList.add('show'), 10);
      setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, 3000);
    }

    /* --- Authentication --- */
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const user = document.getElementById('loginUser').value.trim().toLowerCase();
      const pass = document.getElementById('loginPass').value;
      
      let authenticatedUser = null;
      if (user === adminUser.id && pass === adminUser.pass) {
        authenticatedUser = adminUser;
      } else if (ironPeakPartners[user] && ironPeakPartners[user].pass === pass) {
        authenticatedUser = ironPeakPartners[user];
      }

      if (authenticatedUser) {
        currentUser = authenticatedUser;
        sessionStorage.setItem('ironPeakUser', JSON.stringify(currentUser));
        showToast(dict[ironPeakLang].succLogin + ' ' + (ironPeakLang === 'ar' ? currentUser.nameAr : currentUser.nameEn));
        showApp();
      } else {
        showToast(dict[ironPeakLang].errLogin, 'error');
      }
    });

    function logout() {
      sessionStorage.removeItem('ironPeakUser');
      location.reload();
    }

    function showApp() {
      document.getElementById('loginScreen').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('appContainer').style.display = 'block';
        document.getElementById('currentUserDisplay').innerText = (ironPeakLang === 'ar' ? 'مرحباً، ' : 'Welcome, ') + (ironPeakLang === 'ar' ? currentUser.nameAr : currentUser.nameEn);
        
        if (currentUser.role === 'admin') {
          document.getElementById('navAdmin').style.display = 'flex';
        }
        
        renderDynamicUI();
        switchTab('input');
      }, 400);
    }

    /* --- Tab Navigation --- */
    function switchTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      
      const navId = 'nav' + tabId.charAt(0).toUpperCase() + tabId.slice(1);
      const navEl = document.getElementById(navId);
      if(navEl) navEl.classList.add('active');

      if (tabId === 'analytics') updateAnalytics();
      if (tabId === 'transactions') updateTable();
    }

    /* --- Dynamic UI Rendering based on Partners --- */
    function renderDynamicUI() {
      renderEntryForm();
      renderTableHeaders();
      if (currentUser.role === 'admin') renderAdminPartners();
    }

    function renderEntryForm() {
      const container = document.getElementById('dynamicPartnerInputs');
      container.innerHTML = '';
      Object.values(ironPeakPartners).forEach(p => {
        const name = ironPeakLang === 'ar' ? p.nameAr : p.nameEn;
        const html = `
          <div class="form-group">
            <input type="number" id="profit_${p.id}" class="form-control" step="0.01" required placeholder=" ">
            <label for="profit_${p.id}" class="form-label" style="color:${p.color}">${dict[ironPeakLang].profitShare} ${name}</label>
          </div>
        `;
        container.innerHTML += html;
      });
    }

    function renderTableHeaders() {
      const tr = document.getElementById('tableHeaderRow');
      let html = `<th>${dict[ironPeakLang].thDate}</th><th>${dict[ironPeakLang].thMonth}</th>`;
      Object.values(ironPeakPartners).forEach(p => {
        const name = ironPeakLang === 'ar' ? p.nameAr : p.nameEn;
        html += `<th>${name}</th><th>%</th>`;
      });
      html += `<th>${dict[ironPeakLang].thNet}</th>`;
      tr.innerHTML = html;
    }

    /* --- Entry Logic --- */
    document.getElementById('entryForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const btn = this.querySelector('.btn-submit');
      const originalHtml = btn.innerHTML;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
      
      setTimeout(() => {
        const dateVal = document.getElementById('date').value;
        const dateObj = new Date(dateVal);
        const monthNamesEn = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        const monthNamesAr = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];
        const mArr = ironPeakLang === 'ar' ? monthNamesAr : monthNamesEn;
        const monthStr = mArr[dateObj.getMonth()] + " " + dateObj.getFullYear();

        let totalNet = 0;
        const partnerProfits = {};
        
        Object.keys(ironPeakPartners).forEach(id => {
          const val = parseFloat(document.getElementById(`profit_${id}`).value) || 0;
          partnerProfits[id] = val;
          totalNet += val;
        });

        const entry = {
          id: Date.now(),
          date: dateVal,
          monthAr: monthNamesAr[dateObj.getMonth()] + " " + dateObj.getFullYear(),
          monthEn: monthNamesEn[dateObj.getMonth()] + " " + dateObj.getFullYear(),
          netProfit: totalNet,
          profits: partnerProfits,
          timestamp: dateObj.getTime()
        };

        ironPeakData.push(entry);
        ironPeakData.sort((a, b) => a.timestamp - b.timestamp);
        localStorage.setItem('ironPeakData', JSON.stringify(ironPeakData));
        
        showToast(dict[ironPeakLang].succSave);
        this.reset();
        document.getElementById('date').valueAsDate = new Date();
        btn.innerHTML = originalHtml;
      }, 400);
    });

    /* --- Analytics Logic --- */
    function updateAnalytics() {
      const grid = document.getElementById('analyticsCardsGrid');
      let totalNet = 0;
      const daysCount = new Set(ironPeakData.map(d => d.date)).size;
      const partnerTotals = {};
      const monthlyData = {};
      const dailyData = {};

      Object.keys(ironPeakPartners).forEach(k => partnerTotals[k] = 0);

      ironPeakData.forEach(item => {
        totalNet += item.netProfit;
        Object.keys(ironPeakPartners).forEach(k => {
          if(item.profits[k]) partnerTotals[k] += item.profits[k];
        });

        const mKey = ironPeakLang === 'ar' ? item.monthAr : item.monthEn;
        if (!monthlyData[mKey]) {
          monthlyData[mKey] = { sort: item.date.substring(0,7) };
          Object.keys(ironPeakPartners).forEach(k => monthlyData[mKey][k] = 0);
        }
        Object.keys(ironPeakPartners).forEach(k => {
          if(item.profits[k]) monthlyData[mKey][k] += item.profits[k];
        });

        if (!dailyData[item.date]) dailyData[item.date] = 0;
        dailyData[item.date] += item.netProfit;
      });

      // Render Cards
      let cardsHtml = `
        <div class="stat-card">
          <i class="fa-solid fa-vault stat-icon" style="background: linear-gradient(135deg, var(--primary-teal), #fff); -webkit-background-clip: text;"></i>
          <div class="stat-title">${dict[ironPeakLang].netProfit}</div>
          <div class="stat-value">${totalNet.toLocaleString()} <span class="stat-currency">${dict[ironPeakLang].currency}</span></div>
        </div>
      `;
      Object.keys(ironPeakPartners).forEach(k => {
        const p = ironPeakPartners[k];
        const name = ironPeakLang === 'ar' ? p.nameAr : p.nameEn;
        cardsHtml += `
          <div class="stat-card" onmouseover="this.style.setProperty('--card-hover', '${p.color}')">
            <style>.stat-card:hover::before { background: var(--card-hover, var(--primary-teal)); }</style>
            <i class="fa-solid fa-user-tie stat-icon" style="background: linear-gradient(135deg, ${p.color}, #fff); -webkit-background-clip: text;"></i>
            <div class="stat-title">${dict[ironPeakLang].profitShare} ${name}</div>
            <div class="stat-value" style="color:${p.color}">${partnerTotals[k].toLocaleString()}</div>
          </div>
        `;
      });
      cardsHtml += `
        <div class="stat-card">
          <i class="fa-regular fa-calendar-check stat-icon"></i>
          <div class="stat-title">${dict[ironPeakLang].days}</div>
          <div class="stat-value">${daysCount} <span class="stat-currency">${dict[ironPeakLang].dayUnit}</span></div>
        </div>
      `;
      grid.innerHTML = cardsHtml;

      renderCharts(monthlyData, dailyData);
    }

    function renderCharts(monthlyData, dailyData) {
      Chart.defaults.color = '#94A3B8';
      Chart.defaults.font.family = "'Tajawal', 'Almarai', sans-serif";
      
      const monthLabels = Object.keys(monthlyData).sort((a,b) => monthlyData[a].sort.localeCompare(monthlyData[b].sort));
      
      const datasets = Object.keys(ironPeakPartners).map(k => {
        const p = ironPeakPartners[k];
        return {
          label: ironPeakLang === 'ar' ? p.nameAr : p.nameEn,
          data: monthLabels.map(m => monthlyData[m][k]),
          backgroundColor: p.color,
          borderRadius: 4, borderWidth: 0
        };
      });

      const ctx1 = document.getElementById('monthlyChart').getContext('2d');
      if (monthlyChartInstance) monthlyChartInstance.destroy();
      monthlyChartInstance = new Chart(ctx1, {
        type: 'bar',
        data: { labels: monthLabels, datasets: datasets },
        options: { 
          responsive: true, maintainAspectRatio: false, 
          plugins: { 
            legend: { position: 'top', labels: { color: '#F8FAFC', usePointStyle: true, boxWidth: 8 } },
            tooltip: { backgroundColor: 'rgba(6, 10, 15, 0.9)', titleColor: '#D4AF37', bodyColor: '#fff', padding: 12, borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1 }
          },
          scales: { x: { stacked: true, grid: { display: false } }, y: { stacked: true, grid: { color: 'rgba(255,255,255,0.05)' } } }
        }
      });

      const dayLabels = Object.keys(dailyData).sort();
      const dayValues = []; const cumulativeValues = []; let tempSum = 0;
      dayLabels.forEach(day => {
        dayValues.push(dailyData[day]);
        tempSum += dailyData[day];
        cumulativeValues.push(tempSum);
      });

      const ctx2 = document.getElementById('dailyCumulativeChart').getContext('2d');
      if (dailyChartInstance) dailyChartInstance.destroy();
      
      let gradArea = ctx2.createLinearGradient(0, 0, 0, 400);
      gradArea.addColorStop(0, 'rgba(212, 175, 55, 0.4)');
      gradArea.addColorStop(1, 'rgba(212, 175, 55, 0.0)');

      dailyChartInstance = new Chart(ctx2, {
        type: 'bar',
        data: {
          labels: dayLabels,
          datasets: [
            { type: 'line', label: 'Cumulative', data: cumulativeValues, borderColor: '#D4AF37', backgroundColor: gradArea, fill: true, tension: 0.4, borderWidth: 3, pointRadius: 2, yAxisID: 'y1' },
            { type: 'bar', label: 'Daily Net', data: dayValues, backgroundColor: 'rgba(0, 166, 147, 0.8)', borderRadius: 4, yAxisID: 'y' }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false },
          plugins: { legend: { display:false }, tooltip: { backgroundColor: 'rgba(6, 10, 15, 0.9)', padding: 12 } },
          scales: {
            x: { grid: { display: false } },
            y: { type: 'linear', display: true, position: ironPeakLang==='ar'?'left':'right', grid: { color: 'rgba(255,255,255,0.05)' } },
            y1: { type: 'linear', display: true, position: ironPeakLang==='ar'?'right':'left', grid: { drawOnChartArea: false } }
          }
        }
      });
    }

    /* --- Table Logic --- */
    function updateTable() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';
      
      if(ironPeakData.length === 0) {
        tbody.innerHTML = `<tr><td colspan="${Object.keys(ironPeakPartners).length * 2 + 3}" style="padding:40px; color:var(--text-muted); text-align:center;">${dict[ironPeakLang].emptyData}</td></tr>`;
        return;
      }

      const sortedData = [...ironPeakData].reverse();
      const pKeys = Object.keys(ironPeakPartners);

      sortedData.forEach((item, index) => {
        const tr = document.createElement('tr');
        tr.style.animation = `slideUp 0.4s ease forwards ${(index * 0.05)}s`;
        tr.style.opacity = '0';
        
        let html = `<td>${item.date}</td><td style="color:var(--text-muted); font-size:0.9rem;">${ironPeakLang === 'ar' ? item.monthAr : item.monthEn}</td>`;
        
        pKeys.forEach(k => {
          const val = item.profits[k] || 0;
          const perc = item.netProfit > 0 ? ((val / item.netProfit) * 100).toFixed(1) : 0;
          const color = ironPeakPartners[k].color;
          html += `<td>${val.toLocaleString()}</td><td><span class="badge" style="background:rgba(255,255,255,0.1); color:${color}; border:1px solid ${color}40">${perc}%</span></td>`;
        });
        
        html += `<td class="net-profit-cell">${item.netProfit.toLocaleString()}</td>`;
        tr.innerHTML = html;
        tbody.appendChild(tr);
      });
    }

    /* --- Admin Logic --- */
    document.getElementById('addPartnerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const id = document.getElementById('p_username').value.trim().toLowerCase();
      if(id === 'admin' || ironPeakPartners[id]) {
        showToast('اسم المستخدم موجود مسبقاً', 'error'); return;
      }
      
      ironPeakPartners[id] = {
        id: id,
        pass: document.getElementById('p_password').value,
        role: 'partner',
        nameAr: document.getElementById('p_nameAr').value,
        nameEn: document.getElementById('p_nameEn').value,
        color: document.getElementById('p_color').value
      };
      
      localStorage.setItem('ironPeakPartners', JSON.stringify(ironPeakPartners));
      showToast(dict[ironPeakLang].succAdd);
      this.reset();
      renderDynamicUI();
    });

    function renderAdminPartners() {
      const list = document.getElementById('adminPartnersList');
      list.innerHTML = '';
      Object.values(ironPeakPartners).forEach(p => {
        list.innerHTML += `
          <div class="user-card">
            <div class="user-info">
              <div class="color-dot" style="background-color: ${p.color}; box-shadow: 0 0 10px ${p.color}"></div>
              <div>
                <div style="font-weight:bold; color:var(--text-main)">${ironPeakLang === 'ar' ? p.nameAr : p.nameEn} (@${p.id})</div>
                <div style="font-size:0.8rem; color:var(--text-muted)">Pass: ${p.pass}</div>
              </div>
            </div>
          </div>
        `;
      });
    }

    /* --- Export & Clear --- */
    function exportToExcel() {
      if(ironPeakData.length === 0) { showToast(dict[ironPeakLang].noExport, "error"); return; }
      
      const exportData = ironPeakData.map(item => {
        const row = {
          "Date / التاريخ": item.date,
          "Month / الشهر": item.monthEn,
          "Net / الصافي": item.netProfit
        };
        Object.keys(ironPeakPartners).forEach(k => {
          const name = ironPeakPartners[k].nameEn;
          const val = item.profits[k] || 0;
          const perc = item.netProfit > 0 ? ((val / item.netProfit) * 100).toFixed(1) : 0;
          row[`${name} Profit`] = val;
          row[`${name} %`] = perc + "%";
        });
        return row;
      });

      const worksheet = XLSX.utils.json_to_sheet(exportData);
      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, "Financial_Report");
      XLSX.writeFile(workbook, "IronPeak_Capital_Report.xlsx");
    }

    function clearData() {
      if(confirm(dict[ironPeakLang].confirmClear)) {
        localStorage.removeItem('ironPeakData');
        ironPeakData = [];
        updateTable();
        showToast("Done / تم", "success");
